<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Ponto Saída — porta com seta saindo. O fundo sangra até a borda (maskable). -->
  <rect width="512" height="512" rx="112" fill="#C62828"/>
  <g fill="#fff">
    <!-- batente da porta: "[" aberto à direita -->
    <rect x="130" y="124" width="36"  height="264" rx="14"/>
    <rect x="130" y="124" width="138" height="36"  rx="14"/>
    <rect x="130" y="352" width="138" height="36"  rx="14"/>
    <!-- seta saindo pela porta -->
    <rect x="210" y="238" width="120" height="36" rx="8"/>
    <polygon points="306,196 306,316 392,256"/>
  </g>
</svg>
