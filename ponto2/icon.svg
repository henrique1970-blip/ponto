<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <rect width="192" height="192" rx="44" fill="#1565C0"/>
  <!-- clock face -->
  <circle cx="96" cy="96" r="62" fill="none" stroke="white" stroke-width="7"/>
  <!-- hour markers -->
  <line x1="96" y1="40" x2="96" y2="52" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <line x1="96" y1="140" x2="96" y2="152" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <line x1="40" y1="96" x2="52" y2="96" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <line x1="140" y1="96" x2="152" y2="96" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <!-- hands -->
  <line x1="96" y1="96" x2="96" y2="52" stroke="white" stroke-width="6" stroke-linecap="round"/>
  <line x1="96" y1="96" x2="124" y2="96" stroke="white" stroke-width="6" stroke-linecap="round"/>
  <!-- center dot -->
  <circle cx="96" cy="96" r="5" fill="white"/>
